<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Attendance App</title>

  <!-- Google API -->
  <script src="https://apis.google.com/js/api.js"></script>

  <style>
    body { font-family: Arial; max-width: 500px; margin: auto; }
    button { padding: 10px; margin: 5px 0; width: 100%; }
    video, canvas { width: 100%; margin-top: 10px; }
  </style>
</head>

<body>

<h2>Attendance</h2>

<button onclick="loginGoogle()">Login Google</button>

<input id="nim" placeholder="NIM"><br>
<input id="name" placeholder="Nama"><br>

<button onclick="startCamera()">Start Camera</button>
<video id="video" autoplay></video>
<canvas id="canvas"></canvas>
<button onclick="takePhoto()">Take Photo</button>

<button onclick="getLocation()">Get Location</button>
<p id="locationText">No location</p>

<button onclick="submitAttendance()">Submit</button>

<p id="msg"></p>

<script>
const CLIENT_ID = "263655892688-hjtrv5mqn11hbeiafmniujb1cdj9d69h.apps.googleusercontent.com";
const SPREADSHEET_ID = "15fpGJVmrqUyKLGXZmGG9npmgyefknz2Iu7zm43DwtRk";

let stream;
let locationData;
let photoTaken = false;

// INIT GOOGLE API
gapi.load("client:auth2", async () => {
  await gapi.client.init({
    clientId: CLIENT_ID,
    discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
    scope: "https://www.googleapis.com/auth/spreadsheets"
  });
});

// LOGIN
function loginGoogle() {
  gapi.auth2.getAuthInstance().signIn()
    .then(() => show("Login sukses"))
    .catch(err => show("Login gagal"));
}

// CAMERA
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById("video").srcObject = stream;
}

function takePhoto() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video, 0, 0);
  photoTaken = true;
}

// LOCATION
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    locationData = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };
    document.getElementById("locationText").innerText =
      locationData.lat + ", " + locationData.lng;
  });
}

// SUBMIT
async function submitAttendance() {
  if (!gapi.auth2.getAuthInstance().isSignedIn.get()) {
    show("Login dulu");
    return;
  }

  if (!photoTaken || !locationData) {
    show("Lengkapi foto & lokasi");
    return;
  }

  const nim = document.getElementById("nim").value;
  const name = document.getElementById("name").value;

  const photo = document.getElementById("canvas").toDataURL();

  await gapi.client.sheets.spreadsheets.values.append({
    spreadsheetId: SPREADSHEET_ID,
    range: "Sheet1!A:F",
    valueInputOption: "RAW",
    resource: {
      values: [[
        nim,
        name,
        new Date().toLocaleString(),
        photo,
        locationData.lat,
        locationData.lng
      ]]
    }
  });

  show("Data masuk ke Sheets");
}

// MESSAGE
function show(msg) {
  document.getElementById("msg").innerText = msg;
}
</script>

</body>
</html>
