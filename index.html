<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Attendance App</title>

  <!-- Google API -->
  <script src="https://apis.google.com/js/api.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    video, canvas {
      width: 100%;
      margin-top: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h2>Attendance</h2>

<button onclick="login()">Login Google</button>

<input id="nim" placeholder="NIM">
<input id="name" placeholder="Nama">

<button onclick="startCamera()">Start Camera</button>
<video id="video" autoplay playsinline></video>

<button onclick="takePhoto()">Take Photo</button>
<canvas id="canvas"></canvas>

<button onclick="getLocation()">Get Location</button>
<p id="loc">Belum ada lokasi</p>

<button onclick="submitData()">Submit</button>

<p id="msg"></p>

<script>
const CLIENT_ID = "263655892688-hjtrv5mqn11hbeiafmniujb1cdj9d69h.apps.googleusercontent.com";
const SPREADSHEET_ID = "15fpGJVmrqUyKLGXZmGG9npmgyefknz2Iu7zm43DwtRk";

let stream;
let locationData = null;
let photoTaken = false;

// INIT GOOGLE API
gapi.load("client:auth2", async () => {
  await gapi.client.init({
    clientId: CLIENT_ID,
    discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
    scope: "https://www.googleapis.com/auth/spreadsheets"
  });
});

// LOGIN
function login() {
  gapi.auth2.getAuthInstance().signIn()
    .then(() => show("Login berhasil"))
    .catch(() => show("Login gagal"));
}

// CAMERA
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;

    await video.play();

    show("Kamera aktif");
  } catch (err) {
    console.error(err);
    show("Kamera error: " + err.message);
  }
}

// FOTO
function takePhoto() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video, 0, 0);

  photoTaken = true;
  show("Foto diambil");
}

// LOKASI
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    locationData = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    document.getElementById("loc").innerText =
      locationData.lat + ", " + locationData.lng;

    show("Lokasi didapat");
  }, err => {
    show("Gagal ambil lokasi");
  });
}

// SUBMIT
async function submitData() {
  if (!gapi.auth2.getAuthInstance().isSignedIn.get()) {
    show("Login dulu");
    return;
  }

  if (!photoTaken || !locationData) {
    show("Lengkapi foto & lokasi");
    return;
  }

  const nim = document.getElementById("nim").value;
  const name = document.getElementById("name").value;

  const photo = document.getElementById("canvas").toDataURL();

  try {
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId: SPREADSHEET_ID,
      range: "Sheet1!A:F",
      valueInputOption: "RAW",
      resource: {
        values: [[
          nim,
          name,
          new Date().toLocaleString(),
          photo,
          locationData.lat,
          locationData.lng
        ]]
      }
    });

    show("Data berhasil masuk ke Sheets");
  } catch (err) {
    console.error(err);
    show("Gagal kirim data");
  }
}

// MESSAGE
function show(text) {
  document.getElementById("msg").innerText = text;
}
</script>

</body>
</html>
